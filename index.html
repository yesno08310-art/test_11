<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해양사고 현황 조회 시스템</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
      line-height: 1.6;
    }

    .container {
      max-width: 980px;
      margin: 40px auto;
      background: #ffffff;
      border: 1px solid #dde3ec;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(25, 45, 80, 0.08);
      overflow: hidden;
    }

    header {
      padding: 34px 40px;
      background: linear-gradient(135deg, #12355b, #1f6fb2);
      color: #ffffff;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: -0.5px;
    }

    header p {
      margin: 0;
      opacity: 0.9;
      font-size: 15px;
    }

    main {
      padding: 32px 40px 40px;
    }

    .section-title {
      margin: 0 0 14px;
      padding-left: 12px;
      border-left: 5px solid #1f6fb2;
      font-size: 20px;
      color: #12355b;
    }

    .panel {
      margin-bottom: 28px;
      padding: 22px;
      background: #fbfcfe;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #34445c;
    }

    select,
    input {
      width: 100%;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      font-size: 15px;
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: #1f6fb2;
      box-shadow: 0 0 0 3px rgba(31, 111, 178, 0.12);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      align-items: stretch;
    }

    .total-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 26px;
      border-radius: 12px;
      background: #eef6ff;
      border: 1px solid #cfe3f8;
      text-align: center;
    }

    .total-card span {
      color: #50627a;
      font-weight: 700;
    }

    .total-card strong {
      margin-top: 8px;
      color: #12355b;
      font-size: 38px;
      line-height: 1.2;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid #e5eaf0;
      text-align: center;
      font-size: 14px;
    }

    th {
      background: #12355b;
      color: #ffffff;
      font-weight: 700;
    }

    tbody tr:hover {
      background: #f7fbff;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .type-table td:first-child,
    .type-table th:first-child {
      text-align: left;
      padding-left: 18px;
    }

    .highlight {
      background: #fff1a8 !important;
      font-weight: 700;
    }

    .note {
      margin-top: 10px;
      color: #667085;
      font-size: 13px;
    }

    footer {
      padding: 18px 40px;
      border-top: 1px solid #e5eaf0;
      background: #fafafa;
      color: #667085;
      font-size: 13px;
      text-align: right;
    }

    @media (max-width: 760px) {
      .container {
        margin: 18px;
      }

      header,
      main,
      footer {
        padding-left: 22px;
        padding-right: 22px;
      }

      .controls,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 13px;
      }

      th,
      td {
        padding: 9px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>해양사고 현황 조회 시스템</h1>
      <p>연도별·유형별 해양사고 발생 현황을 조회하는 정적 웹 대시보드</p>
    </header>

    <main>
      <section class="panel">
        <h2 class="section-title">조회 조건</h2>
        <div class="controls">
          <div>
            <label for="yearSelect">연도 선택</label>
            <select id="yearSelect"></select>
          </div>
          <div>
            <label for="yearSearch">연도 검색</label>
            <input id="yearSearch" type="text" placeholder="예: 2008" />
          </div>
        </div>
        <p class="note">연도를 선택하면 해당 연도의 사고유형별 건수가 표시되며, 검색한 연도는 전체 현황 표에서 강조됩니다.</p>
      </section>

      <section class="panel">
        <h2 class="section-title">사고유형별 현황</h2>
        <div class="summary-grid">
          <table class="type-table">
            <thead>
              <tr>
                <th>사고유형</th>
                <th>건수</th>
              </tr>
            </thead>
            <tbody id="typeTableBody"></tbody>
          </table>
          <div class="total-card">
            <span id="selectedYearLabel">선택 연도 총 사고건수</span>
            <strong id="totalCount">0건</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2 class="section-title">전체 연도 현황</h2>
        <table>
          <thead>
            <tr>
              <th>연도</th>
              <th>총계</th>
              <th>충돌</th>
              <th>접촉</th>
              <th>좌초</th>
              <th>전복</th>
              <th>화재폭발</th>
              <th>침몰</th>
              <th>기관손상</th>
            </tr>
          </thead>
          <tbody id="allTableBody"></tbody>
        </table>
      </section>
    </main>

    <footer>
      해양수산부 정보화 담당관 · 1998년~2012년 해양사고 현황
    </footer>
  </div>

  <script>
    const accidentData = [
      { year: 1998, total: 772, collision: 147, contact: 5, grounding: 77, capsize: 14, fire: 60, sinking: 84, engine: 242 },
      { year: 1999, total: 849, collision: 173, contact: 2, grounding: 68, capsize: 27, fire: 67, sinking: 90, engine: 269 },
      { year: 2000, total: 634, collision: 130, contact: 11, grounding: 58, capsize: 19, fire: 48, sinking: 63, engine: 196 },
      { year: 2001, total: 610, collision: 141, contact: 15, grounding: 60, capsize: 21, fire: 62, sinking: 72, engine: 135 },
      { year: 2002, total: 557, collision: 184, contact: 13, grounding: 58, capsize: 29, fire: 42, sinking: 55, engine: 110 },
      { year: 2003, total: 531, collision: 182, contact: 9, grounding: 65, capsize: 22, fire: 53, sinking: 50, engine: 57 },
      { year: 2004, total: 804, collision: 210, contact: 12, grounding: 75, capsize: 35, fire: 57, sinking: 69, engine: 147 },
      { year: 2005, total: 658, collision: 172, contact: 10, grounding: 46, capsize: 22, fire: 71, sinking: 45, engine: 166 },
      { year: 2006, total: 657, collision: 167, contact: 17, grounding: 66, capsize: 16, fire: 41, sinking: 25, engine: 195 },
      { year: 2007, total: 566, collision: 148, contact: 9, grounding: 39, capsize: 21, fire: 37, sinking: 19, engine: 185 },
      { year: 2008, total: 480, collision: 125, contact: 15, grounding: 32, capsize: 8, fire: 25, sinking: 18, engine: 145 },
      { year: 2009, total: 723, collision: 160, contact: 10, grounding: 43, capsize: 18, fire: 34, sinking: 22, engine: 253 },
      { year: 2010, total: 737, collision: 174, contact: 22, grounding: 64, capsize: 17, fire: 25, sinking: 22, engine: 236 },
      { year: 2011, total: 946, collision: 208, contact: 23, grounding: 64, capsize: 38, fire: 57, sinking: 27, engine: 261 },
      { year: 2012, total: 726, collision: 157, contact: 21, grounding: 53, capsize: 25, fire: 55, sinking: 26, engine: 178 }
    ];

    const typeLabels = [
      { key: "collision", label: "충돌" },
      { key: "contact", label: "접촉" },
      { key: "grounding", label: "좌초" },
      { key: "capsize", label: "전복" },
      { key: "fire", label: "화재폭발" },
      { key: "sinking", label: "침몰" },
      { key: "engine", label: "기관손상" }
    ];

    const yearSelect = document.getElementById("yearSelect");
    const yearSearch = document.getElementById("yearSearch");
    const typeTableBody = document.getElementById("typeTableBody");
    const allTableBody = document.getElementById("allTableBody");
    const totalCount = document.getElementById("totalCount");
    const selectedYearLabel = document.getElementById("selectedYearLabel");

    function initYearOptions() {
      accidentData.forEach(item => {
        const option = document.createElement("option");
        option.value = item.year;
        option.textContent = item.year + "년";
        yearSelect.appendChild(option);
      });
      yearSelect.value = 2012;
    }

    function renderTypeTable(year) {
      const selectedData = accidentData.find(item => item.year === Number(year));
      typeTableBody.innerHTML = "";

      typeLabels.forEach(type => {
        const row = document.createElement("tr");
        row.innerHTML = `<td>${type.label}</td><td>${selectedData[type.key].toLocaleString()}건</td>`;
        typeTableBody.appendChild(row);
      });

      selectedYearLabel.textContent = selectedData.year + "년 총 사고건수";
      totalCount.textContent = selectedData.total.toLocaleString() + "건";
    }

    function renderAllTable() {
      const searchYear = yearSearch.value.trim();
      allTableBody.innerHTML = "";

      accidentData.forEach(item => {
        const row = document.createElement("tr");
        if (searchYear !== "" && String(item.year) === searchYear) {
          row.classList.add("highlight");
        }

        row.innerHTML = `
          <td>${item.year}</td>
          <td>${item.total}</td>
          <td>${item.collision}</td>
          <td>${item.contact}</td>
          <td>${item.grounding}</td>
          <td>${item.capsize}</td>
          <td>${item.fire}</td>
          <td>${item.sinking}</td>
          <td>${item.engine}</td>
        `;
        allTableBody.appendChild(row);
      });
    }

    yearSelect.addEventListener("change", () => {
      renderTypeTable(yearSelect.value);
    });

    yearSearch.addEventListener("input", () => {
      renderAllTable();
    });

    initYearOptions();
    renderTypeTable(yearSelect.value);
    renderAllTable();
  </script>
</body>
</html>
